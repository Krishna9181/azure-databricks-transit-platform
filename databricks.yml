bundle:
  name: azure-databricks-transit-platform

workspace:
  host: https://adb-7405613547805720.0.azuredatabricks.net

variables:
  catalog:
    default: mta_rtransit_dev
  email_notifications:
    default: saikrishnareddypoluri26@outlook.com
  cluster_id:
    default: 0417-222320-e1j7vfs2

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: mta_rtransit_dev

  prod:
    mode: production
    workspace:
      root_path: /Shared/azure-databricks-transit-platform/${bundle.target}
    variables:
      catalog: mta_rtransit
    run_as:
      user_name: saikrishnareddypoluri26@outlook.com

resources:
  jobs:
    # ---------------------------------------------------------------
    # Always-on ingestion jobs (PAUSED by default)
    # ---------------------------------------------------------------
    mta_continuous_api_poll:
      name: "MTA Ingestion - Continuous API Poll"
      continuous:
        pause_status: PAUSED
      tasks:
        - task_key: api_poll
          notebook_task:
            notebook_path: ./notebooks/02_mta_gtfs_rt_to_cosmos.py
          existing_cluster_id: ${var.cluster_id}
      email_notifications:
        on_failure:
          - ${var.email_notifications}

    mta_continuous_eh_streaming:
      name: "MTA Streaming - Event Hubs to Bronze"
      continuous:
        pause_status: PAUSED
      tasks:
        - task_key: eh_to_bronze
          notebook_task:
            notebook_path: ./notebooks/04_streaming_eventhubs_to_bronze.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
      email_notifications:
        on_failure:
          - ${var.email_notifications}

    # ---------------------------------------------------------------
    # Daily batch pipeline (6 AM ET)
    # DAG: 03 -> 04a -> 05 -> 06 -> 07 -> 09
    # ---------------------------------------------------------------
    mta_daily_batch:
      name: "MTA Transit Pipeline - Daily Batch"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: bronze_cosmos_to_delta
          notebook_task:
            notebook_path: ./notebooks/03_batch_cosmos_to_delta.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
        - task_key: ingest_route_ref
          notebook_task:
            notebook_path: ./notebooks/04a_ingest_mta_route_ref.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
        - task_key: silver_fact_trip_delay
          depends_on:
            - task_key: bronze_cosmos_to_delta
          notebook_task:
            notebook_path: ./notebooks/05_silver_fact_trip_delay_event.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
        - task_key: silver_dim_route
          depends_on:
            - task_key: ingest_route_ref
          notebook_task:
            notebook_path: ./notebooks/06_silver_dim_route.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
        - task_key: gold_kpi_daily
          depends_on:
            - task_key: silver_fact_trip_delay
            - task_key: silver_dim_route
          notebook_task:
            notebook_path: ./notebooks/07_gold_route_delay_kpi_daily.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
        - task_key: gold_to_azure_sql
          depends_on:
            - task_key: gold_kpi_daily
          notebook_task:
            notebook_path: ./notebooks/09_gold_to_azure_sql.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
      email_notifications:
        on_failure:
          - ${var.email_notifications}
        on_duration_warning_threshold_exceeded:
          - ${var.email_notifications}
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 1800

    # ---------------------------------------------------------------
    # Health monitor (every 6 hours)
    # ---------------------------------------------------------------
    mta_health_monitor:
      name: "MTA Pipeline Health Monitor"
      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: health_check
          notebook_task:
            notebook_path: ./notebooks/08_pipeline_health_monitor.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
      email_notifications:
        on_failure:
          - ${var.email_notifications}

    # ---------------------------------------------------------------
    # Weekly table maintenance (Sunday 2 AM ET)
    # OPTIMIZE + VACUUM + liquid clustering + ANALYZE
    # ---------------------------------------------------------------
    mta_table_maintenance:
      name: "MTA Delta Table Maintenance - Weekly"
      schedule:
        quartz_cron_expression: "0 0 2 ? * SUN *"
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: delta_maintenance
          notebook_task:
            notebook_path: ./notebooks/10_delta_table_maintenance.py
            base_parameters:
              catalog: ${var.catalog}
          existing_cluster_id: ${var.cluster_id}
      email_notifications:
        on_failure:
          - ${var.email_notifications}

    # ---------------------------------------------------------------
    # DLT Pipeline refresh (Daily 7 AM ET — after batch completes)
    # Incremental refresh of DLT medallion tables (serverless)
    # ---------------------------------------------------------------
    mta_dlt_refresh:
      name: "MTA DLT Medallion Pipeline - Daily Refresh"
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: dlt_incremental_refresh
          pipeline_task:
            pipeline_id: ${resources.pipelines.mta_dlt_medallion.id}
            full_refresh: false
      email_notifications:
        on_failure:
          - ${var.email_notifications}

  # ---------------------------------------------------------------
  # DLT Pipeline (Lakeflow Spark Declarative Pipeline)
  # Serverless, triggered mode, reads from existing bronze tables
  # ---------------------------------------------------------------
  pipelines:
    mta_dlt_medallion:
      name: "MTA Transit - DLT Medallion Pipeline"
      serverless: true
      permissions:
        - level: CAN_MANAGE
          user_name: saikrishnareddypoluri26@outlook.com
      catalog: ${var.catalog}
      target: dlt
      photon: true
      channel: PREVIEW
      libraries:
        - notebook:
            path: ./dlt/transformations/eventhub_raw.py
        - notebook:
            path: ./dlt/transformations/cosmos_events.py
        - notebook:
            path: ./dlt/transformations/fact_trip_delay_event.py
        - notebook:
            path: ./dlt/transformations/dim_route.py
        - notebook:
            path: ./dlt/transformations/route_delay_kpi_daily.py
        - notebook:
            path: ./dlt/transformations/route_delay_kpi_enriched.py

  # ---------------------------------------------------------------
  # AI/BI Dashboard (Lakeview)
  # Deployed from .lvdash.json — edit in Databricks UI, export to Git
  # ---------------------------------------------------------------
  dashboards:
    mta_transit_operations:
      display_name: "MTA Transit Pipeline Operations"
      warehouse_id: e9d01412df81ab9c
      file_path: ./dashboards/mta_transit_pipeline_operations.lvdash.json
      permissions:
        - level: CAN_VIEW
          user_name: saikrishnareddypoluri26@outlook.com
